    - "Combat Air Patrol"
    - "Strike"
    - "Intercept"
    - "Reconnaissance"
    - "Air Defence"
    - "CAS"
    - "Logistics"
    - "Training"

  army_ops:
    - "Patrol"
    - "Live Fire Exercise"
    - "Border Vigil"
    - "Counter-Insurgency"
    - "Strike Mission"
    - "Recon"
    - "Logistics"
    - "Training"

  navy_sorties:
    - "Patrol"
    - "Anti-Submarine Warfare"
    - "Humanitarian Aid"
    - "Fleet Exercise"
    - "Strike"
    - "ISR"
    - "Escort"
    - "Port Visit"

# ── Fuel / resource defaults (UI number_input bounds) ─────────────────────────
ui_limits:
  iaf:
    fuel_min: 500
    fuel_max: 8000
    fuel_default: 3000
    fuel_step: 100

  army:
    ammo_min: 0
    ammo_max: 5000
    ammo_default: 0
    ammo_step: 50

  navy:
    fuel_min: 5
    fuel_max: 1000
    fuel_default: 50
    fuel_step: 5

# ── Neo4j Cypher schema used by ontology_tools.py ─────────────────────────────
neo4j_schema:
  valid_labels:
    - Aircraft
    - ArmyAsset
    - Vessel
    - Crew
    - Mission
    - ArmyOperation
    - Sortie
    - ArmyPersonnel
    - NavyCrew

  relationships:
    - "(Aircraft)-[:EXECUTED]->(Mission)"
    - "(Crew)-[:PARTICIPATED_IN]->(Mission)"
    - "(ArmyAsset)-[:DEPLOYED_FOR]->(ArmyOperation)"
    - "(ArmyPersonnel)-[:ENGAGED_IN]->(ArmyOperation)"
    - "(Vessel)-[:SAILED_FOR]->(Sortie)"
    - "(NavyCrew)-[:ASSIGNED_TO]->(Sortie)"

# ── Docker / deployment ────────────────────────────────────────────────────────
docker:
  neo4j_container: "sankalp-neo4j"
  agents_container: "sankalp-agents"
  neo4j_healthcheck_interval: 10       # seconds
  neo4j_healthcheck_retries: 30
  neo4j_startup_wait: 10              # seconds to wait after compose up before setup

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level: "INFO"
  format: "%(levelname)s [%(name)s] %(message)s"
