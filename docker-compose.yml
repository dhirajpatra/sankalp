version: "3.8"

services:
  neo4j:
    image: neo4j:5
    container_name: sankalp-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./data/neo4j_import:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  agents:
    build: .
    container_name: sankalp-agents
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8501:8501"   # Streamlit dashboard
    volumes:
      - ./data:/app/data
      - ./data/neo4j_import:/var/lib/neo4j/import
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      # Groq LLM key — read from your .env file on the host
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_LLM_API_KEY: ${GROQ_API_KEY}
      LLM_API_KEY: ${GROQ_API_KEY}
      MODEL: ${MODEL:-llama-3.1-8b-instant}
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
